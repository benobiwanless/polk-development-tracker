name: Update Polk County News

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update live news JSON
        run: python scripts/update_news.py

      - name: Commit updated feed
        run: |
          git config user.name "polk-news-bot"
          git config user.email "actions@github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Update live Polk County news feed"
          git push
