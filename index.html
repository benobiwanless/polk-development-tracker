<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polk Development Tracker</title>
  <meta name="description" content="Positive Polk County growth news: restaurants, housing, hotels, retail, roads, and business openings." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-bg"></div>
      <img src="images/logo.svg" alt="Polk Development Tracker" class="logo" />
    </header>

    <main>
      <section class="intro">
        <h1>What’s New in Polk County</h1>
        <p>Tracking new developments, businesses, and infrastructure that are shaping our community.</p>
      </section>

      <section class="categories" id="categories">
        <button class="active" data-category="All">All</button>
        <button data-category="Restaurants">🍴 Restaurants</button>
        <button data-category="Housing">🏠 Housing</button>
        <button data-category="Hotels">🛏️ Hotels</button>
        <button data-category="Retail">🛍️ Retail</button>
        <button data-category="Roads">🛣️ Roads</button>
        <button data-category="Coffee">☕ Coffee</button>
        <button data-category="Business">💼 Business</button>
      </section>

      <section class="news-grid" id="newsGrid"></section>
    </main>

    <footer>
      <div class="footer-brand">
        <img src="images/logo.svg" alt="" />
      </div>
      <p>Polk Development Tracker is your source for positive growth and development updates across Polk County, Florida.</p>
      <div class="footer-location">
        <span>📍 Polk County, Florida</span>
        <small>© 2025 Polk Development Tracker</small>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
