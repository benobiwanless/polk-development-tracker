<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Polk County Florida Development Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <img src="assets/Logo.png" class="hero-logo" alt="Polk County Florida Development Tracker">
  </header>

  <nav class="top-nav"><div class="ticker"><span class="ticker-label">LIVE</span><div id="tickerText">Loading Polk County development updates...</div></div></nav>

  <main class="page-shell">
    <section class="toolbar" aria-label="Filters">
      <select id="cityFilter"><option value="">All Cities</option></select>
      <select id="categoryFilter"><option value="">All Categories</option></select>
      <select id="statusFilter"><option value="">All Statuses</option></select>
      <select id="sortFilter">
        <option value="newest">Newest First</option>
        <option value="city">City A-Z</option>
        <option value="category">Category A-Z</option>
      </select>
    </section>

    <section class="section-header">
      <h2>Latest Development Updates</h2>
      <span id="lastUpdated"></span>
    </section>

    <section id="newsGrid" class="news-grid"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
